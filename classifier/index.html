<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifier — Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0533 0%, #3f1089 50%, #7c3aed 100%);
            color: #fff;
            text-align: center;
        }
        .wrap { padding: 40px; }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        h1 span { color: #b794f6; }
        p { font-size: 16px; color: #b794f6; max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }
        .btn-group { display: flex; gap: 12px; justify-content: center; }
        a {
            display: inline-block;
            padding: 10px 28px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            color: #d4bbfc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        a:hover { background: rgba(255,255,255,0.2); color: #fff; }
        a.home { background: rgba(124,58,237,0.3); border-color: rgba(124,58,237,0.5); }
        a.home:hover { background: rgba(124,58,237,0.5); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon">&#128209;</div>
        <h1><span>Classifier</span></h1>
        <p>문서 분류 엔진 기술 문서를 준비 중입니다.</p>
        <div class="btn-group">
            <a class="home" href="../">&#127968; Home</a>
        </div>
    </div>
</body>
</html>
